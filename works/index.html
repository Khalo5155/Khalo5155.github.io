<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>诗集 · 六章</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-page: #f8f6f1;
            --bg-card: #ffffff;
            --bg-hover: #f3efe8;
            --bg-active: #eae3d8;
            --text-primary: #2c2c2c;
            --text-secondary: #6b5f55;
            --text-light: #9a8e84;
            --accent: #8b6b4d;
            --accent-light: #b5957a;
            --border: #e2dad0;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --font-serif: 'Georgia', 'Times New Roman', '宋体', 'Songti SC', serif;
            --font-sans: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --transition: 0.25s ease;
            --max-width: 1280px;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        /* ===== 容器 ===== */
        .app {
            max-width: var(--max-width);
            width: 100%;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            min-height: 80vh;
            max-height: 96vh;
        }

        /* ===== 顶部 ===== */
        .header {
            padding: 28px 32px 16px 32px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg-card);
        }

        .header-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-bottom: 16px;
        }

        .header-title {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text-primary);
        }
        .header-title small {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-light);
            letter-spacing: 0.02em;
            margin-left: 10px;
        }

        .header-count {
            font-size: 0.85rem;
            color: var(--text-light);
            background: var(--bg-page);
            padding: 4px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* ===== 章节导航 ===== */
        .chapter-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 2px;
        }

        .chapter-btn {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            padding: 6px 18px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.02em;
            position: relative;
            white-space: nowrap;
        }
        .chapter-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .chapter-btn.active {
            background: var(--accent);
            color: #fff;
            font-weight: 500;
            box-shadow: 0 2px 12px rgba(139, 107, 77, 0.25);
        }
        .chapter-btn .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            padding: 0 8px;
            margin-left: 4px;
            line-height: 1.6;
        }
        .chapter-btn.active .badge {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== 主体 ===== */
        .main {
            display: flex;
            flex: 1;
            min-height: 0;
            height: 100%;
        }

        /* ===== 诗歌列表 ===== */
        .list-panel {
            width: 300px;
            min-width: 200px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-panel .list-header {
            padding: 16px 20px 10px 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-light);
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-panel .list-header span:last-child {
            font-weight: 400;
            color: var(--text-light);
        }

        .poem-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            list-style: none;
        }

        .poem-list li {
            padding: 10px 20px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .poem-list li:hover {
            background: var(--bg-hover);
        }
        .poem-list li.active {
            background: var(--bg-active);
            border-left-color: var(--accent);
        }

        .poem-list li .index-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
            transition: var(--transition);
        }
        .poem-list li.active .index-dot {
            background: var(--accent);
            width: 8px;
            height: 8px;
        }

        .poem-list li .poem-title {
            font-family: var(--font-serif);
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: var(--transition);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .poem-list li .poem-date-mini {
            font-size: 0.7rem;
            color: var(--text-light);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .poem-list li.active .poem-title {
            color: var(--accent);
            font-weight: 500;
        }

        .poem-list .empty-msg {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* ===== 诗歌详情 ===== */
        .detail-panel {
            flex: 1;
            padding: 32px 40px 40px 40px;
            overflow-y: auto;
            background: var(--bg-card);
            min-width: 0;
        }

        .detail-panel .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-light);
            text-align: center;
        }
        .detail-panel .placeholder .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        .detail-panel .placeholder p {
            font-size: 0.95rem;
            letter-spacing: 0.04em;
        }

        .detail-content {
            animation: fadeSlideUp 0.35s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-content .detail-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .detail-content .detail-date {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 20px;
            letter-spacing: 0.04em;
            display: inline-block;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .detail-content .detail-body {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            line-height: 2;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 24px;
            padding-top: 4px;
        }

        .detail-content .detail-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: 4px;
            font-style: italic;
            letter-spacing: 0.02em;
            line-height: 1.7;
        }

        .detail-content .detail-description::before {
            content: "✧ ";
            color: var(--accent-light);
            font-style: normal;
        }

        /* ===== 加载状态 ===== */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            flex-direction: column;
            color: var(--text-light);
            gap: 16px;
            padding: 40px;
        }
        .loading-state .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-state p {
            font-size: 0.95rem;
            letter-spacing: 0.04em;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            body {
                padding: 12px;
            }
            .app {
                max-height: none;
                min-height: 90vh;
                border-radius: var(--radius-sm);
            }
            .header {
                padding: 20px 18px 12px 18px;
            }
            .header-title {
                font-size: 1.4rem;
            }
            .header-title small {
                font-size: 0.85rem;
                margin-left: 6px;
            }
            .header-count {
                font-size: 0.75rem;
                padding: 2px 12px;
            }
            .chapter-btn {
                font-size: 0.8rem;
                padding: 4px 14px;
            }

            .main {
                flex-direction: column;
                height: auto;
            }

            .list-panel {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 200px;
                flex-shrink: 0;
            }
            .list-panel .list-header {
                padding: 12px 16px 8px 16px;
                font-size: 0.75rem;
            }
            .poem-list li {
                padding: 8px 16px;
            }
            .poem-list li .poem-title {
                font-size: 0.88rem;
            }

            .detail-panel {
                padding: 20px 18px 28px 18px;
                min-height: 300px;
                flex: 1;
            }
            .detail-content .detail-title {
                font-size: 1.6rem;
            }
            .detail-content .detail-body {
                font-size: 0.95rem;
                line-height: 1.9;
            }
            .detail-content .detail-description {
                font-size: 0.88rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 6px;
            }
            .header {
                padding: 14px 12px 10px 12px;
            }
            .header-title {
                font-size: 1.2rem;
            }
            .header-title small {
                font-size: 0.75rem;
                display: block;
                margin-left: 0;
            }
            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .chapter-btn {
                font-size: 0.75rem;
                padding: 4px 12px;
            }
            .detail-panel {
                padding: 16px 14px 24px 14px;
            }
            .detail-content .detail-title {
                font-size: 1.3rem;
            }
            .detail-content .detail-body {
                font-size: 0.9rem;
                line-height: 1.8;
            }
            .list-panel {
                max-height: 160px;
            }
            .poem-list li {
                padding: 6px 12px;
            }
            .poem-list li .poem-title {
                font-size: 0.82rem;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- 顶部 -->
        <header class="header">
            <div class="header-top">
                <div class="header-title">
                    诗集 <small>六章</small>
                </div>
                <div class="header-count" id="totalCount">共 0 首</div>
            </div>
            <nav class="chapter-nav" id="chapterNav">
                <!-- 由 JS 动态生成 -->
            </nav>
        </header>

        <!-- 主体 -->
        <div class="main">
            <!-- 左侧列表 -->
            <section class="list-panel" id="listPanel">
                <div class="list-header">
                    <span>📜 诗歌</span>
                    <span id="listCount">0 首</span>
                </div>
                <ul class="poem-list" id="poemList">
                    <!-- 由 JS 动态生成 -->
                </ul>
            </section>

            <!-- 右侧详情 -->
            <section class="detail-panel" id="detailPanel">
                <!-- 由 JS 动态生成 -->
            </section>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== DOM 引用 =====
            const chapterNav = document.getElementById('chapterNav');
            const poemList = document.getElementById('poemList');
            const detailPanel = document.getElementById('detailPanel');
            const totalCount = document.getElementById('totalCount');
            const listCount = document.getElementById('listCount');

            // ===== 状态 =====
            let allPoems = []; // 所有诗歌
            let grouped = {}; // { chapter: [poems] }
            let chapters = []; // 排序后的章节列表
            let currentChapter = null;
            let currentPoemId = null; // 使用 index 作为 id

            // ===== 工具函数 =====
            function getChapterLabel(chapter) {
                // 如果 chapter 是数字，转为中文
                if (typeof chapter === 'number') {
                    const map = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
                    return `第${map[chapter - 1] || chapter}章`;
                }
                // 如果已经是 "第一章" 样式，直接返回
                if (typeof chapter === 'string' && /^第.{1,2}章$/.test(chapter)) {
                    return chapter;
                }
                // 否则原样返回
                return String(chapter);
            }

            function getChapterSortKey(chapter) {
                // 尝试提取数字排序
                if (typeof chapter === 'number') return chapter;
                const match = String(chapter).match(/(\d+)/);
                if (match) return parseInt(match[1], 10);
                // 中文数字映射
                const map = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
                for (const [cn, num] of Object.entries(map)) {
                    if (String(chapter).includes(cn)) return num;
                }
                return 999; // 兜底
            }

            // ===== 加载数据 =====
            async function loadData() {
                try {
                    const resp = await fetch('./poetry.jsonl');
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const text = await resp.text();
                    const lines = text.split('\n').filter(line => line.trim() !== '');
                    const poems = lines.map((line, idx) => {
                        try {
                            const obj = JSON.parse(line);
                            // 确保每个对象有基本字段
                            return {
                                title: obj.title || '无题',
                                date: obj.date || '',
                                content: obj.content || '',
                                description: obj.description || '',
                                chapter: obj.chapter !== undefined ? obj.chapter : 1,
                                _index: idx,
                            };
                        } catch (e) {
                            console.warn('第', idx + 1, '行解析失败:', line);
                            return null;
                        }
                    }).filter(p => p !== null);

                    if (poems.length === 0) {
                        throw new Error('未解析到任何诗歌数据');
                    }

                    allPoems = poems;

                    // 按章节分组
                    const g = {};
                    for (const p of allPoems) {
                        const key = String(p.chapter);
                        if (!g[key]) g[key] = [];
                        g[key].push(p);
                    }
                    grouped = g;

                    // 排序章节
                    chapters = Object.keys(grouped).sort((a, b) => {
                        return getChapterSortKey(a) - getChapterSortKey(b);
                    });

                    // 更新总数
                    totalCount.textContent = `共 ${allPoems.length} 首`;

                    // 渲染
                    renderChapters();
                    // 默认选中第一个有诗的章节
                    if (chapters.length > 0) {
                        setCurrentChapter(chapters[0]);
                    } else {
                        showEmptyState();
                    }

                } catch (err) {
                    console.error('加载失败:', err);
                    detailPanel.innerHTML = `
                        <div class="placeholder" style="padding:40px 20px;">
                            <div class="icon">📭</div>
                            <p style="font-size:1rem;color:#b5a89a;">加载数据失败</p>
                            <p style="font-size:0.85rem;color:#ccc;margin-top:6px;">${err.message}</p>
                            <p style="font-size:0.8rem;color:#ddd;margin-top:12px;">请确保 poems.jsonl 文件位于同一目录下</p>
                        </div>
                    `;
                    poemList.innerHTML = `<li class="empty-msg">数据加载失败</li>`;
                    totalCount.textContent = '共 0 首';
                }
            }

            // ===== 渲染章节导航 =====
            function renderChapters() {
                chapterNav.innerHTML = '';
                for (const ch of chapters) {
                    const btn = document.createElement('button');
                    btn.className = 'chapter-btn';
                    btn.dataset.chapter = ch;
                    const label = getChapterLabel(ch);
                    const count = grouped[ch] ? grouped[ch].length : 0;
                    btn.innerHTML = `${label} <span class="badge">${count}</span>`;
                    btn.addEventListener('click', () => {
                        setCurrentChapter(ch);
                    });
                    chapterNav.appendChild(btn);
                }
            }

            // ===== 设置当前章节 =====
            function setCurrentChapter(chapterKey) {
                currentChapter = chapterKey;
                // 更新导航高亮
                document.querySelectorAll('.chapter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.chapter === chapterKey);
                });
                // 渲染诗歌列表
                renderPoemList(chapterKey);
                // 选中第一首诗
                const poems = grouped[chapterKey] || [];
                if (poems.length > 0) {
                    selectPoem(poems[0]._index);
                } else {
                    showEmptyDetail('该章节暂无诗歌');
                }
            }

            // ===== 渲染诗歌列表 =====
            function renderPoemList(chapterKey) {
                const poems = grouped[chapterKey] || [];
                listCount.textContent = `${poems.length} 首`;

                if (poems.length === 0) {
                    poemList.innerHTML = `<li class="empty-msg">该章节暂无诗歌</li>`;
                    return;
                }

                const frag = document.createDocumentFragment();
                for (const p of poems) {
                    const li = document.createElement('li');
                    li.dataset.index = p._index;
                    li.innerHTML = `
                        <span class="index-dot"></span>
                        <span class="poem-title">${escapeHtml(p.title)}</span>
                        <span class="poem-date-mini">${p.date || ''}</span>
                    `;
                    li.addEventListener('click', () => {
                        selectPoem(p._index);
                    });
                    frag.appendChild(li);
                }
                poemList.innerHTML = '';
                poemList.appendChild(frag);

                // 高亮当前选中的诗歌
                highlightCurrentPoem();
            }

            // ===== 选中某首诗 =====
            function selectPoem(index) {
                const poem = allPoems.find(p => p._index === index);
                if (!poem) return;

                currentPoemId = index;
                highlightCurrentPoem();
                renderDetail(poem);
            }

            // ===== 高亮当前诗歌 =====
            function highlightCurrentPoem() {
                const items = poemList.querySelectorAll('li');
                items.forEach(li => {
                    const idx = parseInt(li.dataset.index, 10);
                    li.classList.toggle('active', idx === currentPoemId);
                });
                // 滚动到可见
                const activeEl = poemList.querySelector('li.active');
                if (activeEl) {
                    activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }

            // ===== 渲染详情 =====
            function renderDetail(poem) {
                const hasDesc = poem.description && poem.description.trim() !== '';

                detailPanel.innerHTML = `
                    <div class="detail-content">
                        <div class="detail-title">${escapeHtml(poem.title)}</div>
                        ${poem.date ? `<div class="detail-date">${escapeHtml(poem.date)}</div>` : ''}
                        <div class="detail-body">${escapeHtml(poem.content)}</div>
                        ${hasDesc ? `<div class="detail-description">${escapeHtml(poem.description)}</div>` : ''}
                    </div>
                `;
            }

            // ===== 空状态 =====
            function showEmptyDetail(msg) {
                detailPanel.innerHTML = `
                    <div class="placeholder">
                        <div class="icon">📖</div>
                        <p>${msg || '暂无诗歌'}</p>
                    </div>
                `;
            }

            function showEmptyState() {
                detailPanel.innerHTML = `
                    <div class="placeholder">
                        <div class="icon">📭</div>
                        <p>暂无诗歌数据</p>
                    </div>
                `;
                poemList.innerHTML = `<li class="empty-msg">暂无诗歌</li>`;
                listCount.textContent = '0 首';
            }

            // ===== 简易防 XSS =====
            function escapeHtml(str) {
                if (!str) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // ===== 初始化 =====
            // 显示加载状态
            detailPanel.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>正在载入诗集 …</p>
                </div>
            `;
            poemList.innerHTML = `<li class="empty-msg">加载中...</li>`;

            loadData();

        })();
    </script>

</body>
</html>
